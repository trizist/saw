name: 🔐 Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Mondays

jobs:
  slither-analysis:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Install dependencies
        run: forge install

      - name: Run Slither
        run: |
          slither . \
            --solc-remaps '@openzeppelin=node_modules/@openzeppelin' \
            --filter-paths 'node_modules|test|scripts' \
            --fail-on reentrancy-eth,reentrancy-no-eth,reentrancy-unlimited-gas \
            --fail-on arbitrary-send,controlled-array-length,controlled-delegatecall \
            --check-assertion-violation \
            --check-constant-function \
            --check-delegatecall-in-loop \
            --check-erc20-interface \
            --check-low-level-calls \
            --check-nested-mapping \
            --check-reentrancy \
            --check-uninitialized-function \
            --check-unprotected-functions \            --check-unused-state \
            --check-var-ordering \
            --check-weak-prng \
            --print human-summary \
            --json slither-results.json

      - name: Upload Slither Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-results
          path: slither-results.json

      - name: Check for Critical Issues
        run: |
          CRITICAL=$(cat slither-results.json | jq '.results.high|.length')
          if [ "$CRITICAL" -gt 0 ]; then
            echo "❌ Found $CRITICAL high-severity issues"
            exit 1
          fi
          echo "✅ No critical security issues found"

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript', 'typescript']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3        with:
          category: "/language:${{matrix.language}}"

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: |
          npm audit --audit-level=high || {
            echo "⚠️ High-severity vulnerabilities found"
            npm audit --json > npm-audit-results.json
          }

      - name: Upload Audit Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-results
          path: npm-audit-results.json

  secret-scanning:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
  test-coverage:
    name: Test Coverage Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Install dependencies
        run: |
          npm ci
          forge install

      - name: Run tests
        run: |
          forge test --verbosity 2
          npm run test

      - name: Check coverage
        run: |
          forge coverage --report summary --report lcov
          echo "Coverage report generated"
